name: Integration Testing with Docker Compose

on:
  pull_request:
    branches:
      - main

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      # 1. عمل Checkout للكود من المستودع
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 2. تشغيل الـ Docker Compose في الخلفية (Detached Mode)
      - name: Start Docker Compose Stack
        run: docker-compose up -d

      # 3. الانتظار لمدة 15 ثانية حتى تفتح قاعدة البيانات والسيرفر تماماً
      - name: Wait for services to initialize
        run: sleep 15

      # 4. عمل اختبار شبكة والتأكد من أن السيرفر شغال وبيرد بـ 200 OK
      - name: Run Network Test
        run: curl -f http://localhost:8080 || exit 1

      # 5. تنظيف البيئة وقفل الـ Containers وعرض الـ Logs حتى لو الاختبار فشل
      - name: Teardown Docker Compose
        if: always()
        run: |
          docker-compose logs
          docker-compose down
